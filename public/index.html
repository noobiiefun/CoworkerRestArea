<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Coworker Rest Area</title>
<link rel="stylesheet" href="/css/style.css" />
<link rel="stylesheet" href="/css/theater.css" />
</head>
<body>

  <!-- ===================== BOOT / CHECK-IN SCREEN ===================== -->
  <div id="boot-screen">
    <div class="boot-card">
      <div class="boot-sign">
        <span class="boot-sign-bolt">⛽</span>
        <h1>COWORKER<br/>REST&nbsp;AREA</h1>
        <p class="boot-sub">Tempat istirahat virtual buat para pekerja. Singgah, ganti nama, ganti wajah, ngobrol bebas.</p>
      </div>

      <div class="boot-form">
        <label class="boot-label">Pilih ikon kamu</label>
        <div id="boot-avatar-grid" class="avatar-grid"></div>

        <label class="boot-label" for="boot-nickname">Nama panggilan (anonim, bisa diganti kapan saja)</label>
        <input id="boot-nickname" type="text" maxlength="24" placeholder="contoh: Penjelajah Malam" />

        <button id="boot-enter-btn" class="btn-primary">Masuk ke Rest Area →</button>
        <p class="boot-note">🔒 Identitasmu sepenuhnya anonim. Pesan tidak pernah disimpan ke disk — begitu server di-restart, semua riwayat chat hilang.</p>
      </div>
    </div>
  </div>

  <!-- ===================== DESKTOP ===================== -->
  <div id="desktop" class="hidden">
    <div id="wallpaper" aria-hidden="true">
      <svg viewBox="0 0 1200 700" preserveAspectRatio="xMidYMax slice" xmlns="http://www.w3.org/2000/svg">
        <defs>
          <linearGradient id="sky" x1="0" y1="0" x2="0" y2="1">
            <stop offset="0%" stop-color="#0a0d13"/>
            <stop offset="55%" stop-color="#121826"/>
            <stop offset="100%" stop-color="#1c2436"/>
          </linearGradient>
          <radialGradient id="glow" cx="50%" cy="68%" r="45%">
            <stop offset="0%" stop-color="#ffb454" stop-opacity="0.35"/>
            <stop offset="100%" stop-color="#ffb454" stop-opacity="0"/>
          </radialGradient>
        </defs>
        <rect width="1200" height="700" fill="url(#sky)"/>
        <rect width="1200" height="700" fill="url(#glow)"/>
        <g class="stars">
          <circle cx="120" cy="80" r="1.6" fill="#fff" opacity="0.6"/>
          <circle cx="300" cy="140" r="1.2" fill="#fff" opacity="0.4"/>
          <circle cx="520" cy="60" r="1.8" fill="#fff" opacity="0.5"/>
          <circle cx="760" cy="110" r="1.3" fill="#fff" opacity="0.45"/>
          <circle cx="940" cy="70" r="1.7" fill="#fff" opacity="0.55"/>
          <circle cx="1080" cy="150" r="1.2" fill="#fff" opacity="0.4"/>
          <circle cx="200" cy="220" r="1" fill="#fff" opacity="0.3"/>
          <circle cx="900" cy="200" r="1" fill="#fff" opacity="0.35"/>
        </g>
        <!-- road -->
        <polygon points="430,700 770,700 640,430 560,430" fill="#0d1018"/>
        <polygon points="595,430 605,430 760,700 700,700" fill="#2a3142" opacity="0.0"/>
        <line x1="600" y1="430" x2="600" y2="700" stroke="#ffb454" stroke-width="4" stroke-dasharray="14 18" opacity="0.55"/>
        <!-- rest area sign -->
        <g transform="translate(870,360)">
          <rect x="-10" y="0" width="10" height="120" fill="#2a3142"/>
          <rect x="-90" y="-58" width="170" height="64" rx="8" fill="#1c2436" stroke="#ffb454" stroke-width="2"/>
          <text x="-5" y="-30" text-anchor="middle" font-family="Arial, sans-serif" font-weight="700" font-size="15" fill="#ffb454" letter-spacing="1">REST AREA</text>
          <text x="-5" y="-10" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#7fd9cf">NEXT EXIT • OPEN 24H</text>
        </g>
        <!-- bench / cup silhouette -->
        <g transform="translate(310,520)" opacity="0.85">
          <rect x="0" y="40" width="90" height="8" fill="#2a3142"/>
          <rect x="6" y="48" width="8" height="26" fill="#2a3142"/>
          <rect x="76" y="48" width="8" height="26" fill="#2a3142"/>
          <rect x="0" y="24" width="90" height="8" fill="#2a3142"/>
        </g>
      </svg>
    </div>

    <div id="desktop-icons">
      <!-- Ruang Obrolan -->
      <button class="desktop-icon" data-app="chat" title="Ruang Obrolan">
        <span class="icon-glyph">💬</span>
        <span class="icon-label">Ruang Obrolan</span>
      </button>
      <!-- Nonton Bareng — AKTIF (Step 2) -->
      <button class="desktop-icon" data-app="theater" title="Nonton Bareng">
        <span class="icon-glyph">📺</span>
        <span class="icon-label">Nonton Bareng</span>
      </button>
      <!-- Watch Me — masih SOON -->
      <button class="desktop-icon is-soon" data-app="watchme" title="Segera hadir">
        <span class="icon-glyph">🖥️</span>
        <span class="icon-label">Watch Me</span>
        <span class="soon-badge">SOON</span>
      </button>
    </div>

    <div id="windows-layer"></div>

    <div id="taskbar">
      <button id="start-btn">
        <span class="start-glyph">⛽</span> <span class="start-text">Rest Area</span>
      </button>
      <div id="start-menu" class="hidden">
        <div class="start-menu-item" data-app="chat">💬 Ruang Obrolan</div>
        <div class="start-menu-item" data-app="theater">📺 Nonton Bareng</div>
        <div class="start-menu-item disabled" data-app="watchme">🖥️ Watch Me <small>segera</small></div>
      </div>
      <div id="taskbar-running"></div>
      <div id="taskbar-right">
        <span id="online-count" title="Pengguna online">👥 0</span>
        <span id="lan-address" title="Alamat untuk diakses komputer lain"></span>
        <span id="clock"></span>
      </div>
    </div>
  </div>

  <!-- ===================== TEMPLATES ===================== -->
  <template id="tpl-window">
    <div class="window">
      <div class="window-titlebar">
        <span class="window-icon"></span>
        <span class="window-title"></span>
        <div class="window-controls">
          <button class="win-btn win-min" title="Minimalkan">─</button>
          <button class="win-btn win-max" title="Maksimalkan">▢</button>
          <button class="win-btn win-close" title="Tutup">✕</button>
        </div>
      </div>
      <div class="window-body"></div>
      <div class="window-resize-handle"></div>
    </div>
  </template>

  <script src="/socket.io/socket.io.js"></script>
  <script src="/js/desktop.js"></script>
  <script src="/js/chat.js"></script>
  <script src="/js/theater.js"></script>
</body>
</html>
